  <!-- CONTACT -->
  <section class="contact-head">
    <h2 class="h-navy">Contact Me</h2>
  </section>

  <!-- NOTE: form is not yet wired to send. To make it work we need (1) your email and
       (2) a free Formspree endpoint. Until then, the LinkedIn link below is the working contact. -->
  <form class="contact-form" action="#" onsubmit="return false;">
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" />
    </div>
    <div class="field">
      <label for="subject">Subject</label>
      <input type="text" id="subject" name="subject" placeholder="Type the subject" />
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Type your message here..."></textarea>
    </div>
    <button type="submit" class="submit">Submit</button>
    <p class="contact-alt">Or reach me directly on <a href="https://www.linkedin.com/in/bineth-losara-8b21002a8/" target="_blank" rel="noopener">LinkedIn</a>.</p>
  </form>

  <footer class="site">© <span class="year"></span> Bineth Atapattu</footer>
  <script>document.querySelectorAll('.year').forEach(e=>e.textContent=new Date().getFullYear());</script>
